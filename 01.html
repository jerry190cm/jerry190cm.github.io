<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏禾軒的網頁</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f0f0;
            padding: 30px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #f4a261;
            color: white;
        }
        ul {
            text-align: left;
            display: inline-block;
        }
        img {
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>大家好，我是夏禾軒！</h1>
        
        <img src="https://tw.portal-pokemon.com/play/resources/pokedex/img/pm/2b3f6ff00db7a1efae21d85cfb8995eaff2da8d8.png" width="200" alt="皮卡丘">
        
        <h2>我的興趣</h2>
        <ul>
            <li>打籃球</li>
            <li>寫程式</li>
            <li>聽音樂</li>
        </ul>
        
        <h2>我的成績</h2>
        </table>
            <tr>
                <th>科目</th>
                <th>分數</th>
            </tr>
            <tr>
                <td>數學</td>
                <td>95</td>
            </tr>
            <tr>
                <td>英文</td>
                <td>88</td>
            </tr>
            <tr>
                <td>程式設計</td>
                <td>100</td>
            </tr>
        </table>
    </div>
</body>
</html>
